name: Scrape match data from zerozero.pt

on:
  schedule:
    - cron: '0 0 * * 2' # Every Tuesday at midnight UTC
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install cheerio
        run: npm install cheerio

      - name: Run scraper
        run: node scripts/scrape-jogos.mjs

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet src/data/jogos.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/jogos.json
          git commit -m "chore: atualizar resultados zerozero.pt"
          git push
