name: Atualizar dados FPF

on:
  schedule:
    # Todas as segundas-feiras às 22:00 UTC (23:00 Portugal no inverno, 23:00 no verão)
    - cron: '0 22 * * 1'
  workflow_dispatch:  # permite correr manualmente via GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Correr update-fpf
        env:
          FPF_COMPETITION_ID: ${{ vars.FPF_COMPETITION_ID || '28127' }}
          FPF_SEASON_ID: ${{ vars.FPF_SEASON_ID || '105' }}
          FPF_CLUB_NAME: ${{ vars.FPF_CLUB_NAME || 'Alcainça' }}
        run: node scripts/update-fpf.js

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/alcainca.json
          if git diff --cached --quiet; then
            echo "Sem alterações para committar."
          else
            git commit -m "chore(data): atualiza dados FPF $(date -u +%Y-%m-%d)"
            git push
          fi
